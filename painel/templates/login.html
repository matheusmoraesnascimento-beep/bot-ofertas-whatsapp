<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login — Bot Ofertas</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
    .box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); width: 300px; }
    h2 { margin-top: 0; }
    input { width: 100%; padding: .5rem; margin: .5rem 0 1rem; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: .6rem; background: #25D366; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    .erro { color: red; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🤖 Bot Ofertas</h2>
    {% if erro %}<p class="erro">{{ erro }}</p>{% endif %}
    <form method="post">
      <label>Senha</label>
      <input type="password" name="senha" autofocus>
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
